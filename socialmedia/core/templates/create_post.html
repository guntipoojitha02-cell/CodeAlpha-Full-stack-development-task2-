<!DOCTYPE html>
<html>

<head>

    <title>Create Post</title>

</head>

<body>

    <h1>Create Post</h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="image"
            placeholder="Image URL"
        >

        <br><br>

        <textarea
            name="caption"
            placeholder="Caption"
        ></textarea>

        <br><br>

        <button type="submit">

            Post

        </button>

    </form>

</body>
</html>
